version: '3.8'

services:
  vnc-python-dev:
    image: consol/debian-xfce-vnc:v2.0.3
    container_name: ${PROJECT_NAME:-vnc-python-dev}
    restart: unless-stopped
    ports:
      # noVNC Web 访问端口
      - "${HOST_PORT_NOVNC:-9601}:6901"
      # VNC 直接访问端口 (可选)
      - "${HOST_PORT_VNC:-5901}:5901"
    environment:
      - TZ=${TIMEZONE:-Asia/Shanghai}
      - VNC_RESOLUTION=${RESOLUTION:-1280x720}
      - VNC_PW=${VNC_PASSWORD:-1234}
    volumes:
      # 将当前目录挂载到桌面 data 文件夹，方便访问初始化脚本
      - .:/headless/Desktop/data
    user: "0"
